model_id: HuggingFaceTB/SmolLM2-360M-Instruct
source:
  benchmark: >
    Local Apple MPS prefill inspection plus second-pass and third-pass
    teacher-forced validation.
  backend: torch_mps
  prompt_length: 1024
  tokens_per_page: 256
  notes: >
    CUDA starter profile derived from the safer SmolLM2 local passes. This
    keeps the useful early strict key pocket, clamps the deepest key layers
    back to strict to reduce late K:M2 pressure, and leaves values on balanced.
    Start here before trying any forced late-value overrides or broader
    aggressive key schedules.

key_policy_tier: balanced
value_policy_tier: balanced

key_layer_sensitivity:
  - layer:3=strict
  - layer:4=strict
  - layer:5=strict
  - layer:24=strict
  - layer:25=strict
  - layer:26=strict
  - layer:27=strict
  - layer:28=strict
  - layer:29=strict
  - layer:30=strict
  - layer:31=strict

value_layer_sensitivity: []
