model_id: Qwen/Qwen3.5-0.8B
source:
  benchmark: >
    Promoted CUDA shortlist/value-escape lane after the 2026-03-30
    layer-23 ablation and prewarm threshold sweep.
  backend: torch_cuda
  prompt_lengths: 32K, 49K, 65K
  tokens_per_page: 16
  notes: >
    Use the candidate-only shortlist lane with selected-page layer-23 value
    escape. Prewarm only once context reaches 49152, where the upfront build
    cost is repaid by smoother decode.

key_policy_tier: exact
value_policy_tier: exact
recent_window: 128

execution_recent_window: 1024
execution_sink_window: 256
execution_relevance_top_k: 4
execution_relevance_mode: envelope
execution_relevance_top_k_context_overrides:
  - layer:23:min_ctx:8192=8

execution_builtin_selector_cache: true
execution_builtin_selector_candidate_only: true

key_mode_overrides:
  - layer:23=M0
value_mode_overrides:
  - layer:23=M0

execution_value_escape_layers:
  - 23
execution_value_escape_mode: M3
execution_value_escape_prewarm: true
execution_value_escape_prewarm_min_context: 49152
